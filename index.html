<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Parcel → WDFW PHS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:wght@300;600&display=swap"
        rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<header class="app-header">
  <h1>
    <span>parcel</span>
    select →
    <em>wdfw phs</em>
  </h1>

  <div class="header-badge">
    WA Parcels + WDFW ArcGIS REST
  </div>
</header>

<main>

  <!-- SIDEBAR -->
  <aside>

    <div class="tabs">
      <button class="tab active" data-tab="parcels">
        📦 Parcels
      </button>

      <button class="tab" data-tab="phs">
        🦅 PHS Results
      </button>
    </div>

    <div class="workflow-bar">
      <div class="wf-step active">1. Find</div>
      <div class="wf-step">2. Select</div>
      <div class="wf-step">3. Analyze</div>
      <div class="wf-step">4. Review</div>
    </div>

    <!-- PARCEL TAB -->
    <section class="tab-panel active" id="tab-parcels">

      <div class="search-box">

        <label class="sb-label">
          Search Parcels
        </label>

        <div class="sb-row">
          <input id="parcel-search-input"
                 type="text"
                 placeholder="Address, parcel ID, owner, city…" />

          <button id="parcel-search-btn">
            Search
          </button>
        </div>

        <div class="search-help">
          Search by address, parcel ID, city, or owner.
        </div>
      </div>

      <div class="sel-summary">

        <span id="sel-pill" class="sel-pill">
          0 selected
        </span>

        <div class="sel-actions">
          <button id="zoom-sel-btn">
            Zoom To
          </button>

          <button id="clear-sel-btn">
            Clear
          </button>
        </div>
      </div>

      <div id="parcel-info-card"></div>

      <div id="parcel-list">
        <div class="empty-state">
          <div class="icon">🗺️</div>

          <strong>Find a parcel to begin</strong><br/>

          Zoom into your project area or search above.
        </div>
      </div>

      <div class="query-bar">
        <button id="query-phs-btn" disabled>
          🦅 Analyze Selected Parcels
        </button>
      </div>

    </section>

    <!-- PHS TAB -->
    <section class="tab-panel" id="tab-phs">

      <div id="phs-summary-card"></div>

      <div id="phs-results">
        <div class="empty-state">
          <div class="icon">🌿</div>

          Select parcels and run analysis.
        </div>
      </div>

    </section>

    <footer id="status-bar">
      Ready.
    </footer>

  </aside>

  <!-- MAP -->
  <div id="map-wrap">

    <div id="map"></div>

    <div id="basemap-ctrl"></div>

    <div id="zoom-scale-ctrl"></div>

    <div id="phs-legend"></div>

    <div id="detail-drawer"></div>

  </div>

</main>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- App -->
<script src="js/app.js"></script>

</body>
</html>
